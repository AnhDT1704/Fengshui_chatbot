<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vạn An Group · Tư vấn phong thủy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg:           #faf6f1;
    --surface:      #ffffff;
    --surface-2:    #f3ece1;
    --border:       #e5dccc;
    --text:         #2a2418;
    --text-soft:    #6b6452;
    --primary:      #b8762f;
    --primary-2:    #8a5723;
    --primary-soft: #f4e6cd;
    --accent:       #c44545;
    --bot-bubble:   #f7f1e6;
    --user-bubble:  #b8762f;
    --user-text:    #ffffff;
    --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(184,118,47,0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
  }

  /* ───── App layout ───── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 880px;
    margin: 0 auto;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  /* ───── Header ───── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface) 0%, #fbf6ed 100%);
  }
  .header-title {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600;
  }
  .logo {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display: grid; place-items: center;
    color: #fff; font-size: 20px;
    box-shadow: var(--shadow);
  }
  .header-title-text {
    display: flex; flex-direction: column;
    line-height: 1.2;
  }
  .header-title-text .name { font-size: 16px; color: var(--text); }
  .header-title-text .sub  { font-size: 12px; color: var(--text-soft); font-weight: 400; }

  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-soft);
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.15s;
    font-size: 16px;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--primary); border-color: var(--primary); }

  /* ───── Chat area ───── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 24px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--text-soft);
  }
  .empty-state h2 { color: var(--primary); margin: 12px 0 8px; font-size: 18px; }
  .empty-state .suggestions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    max-width: 520px; margin: 24px auto 0;
  }
  .suggestion-chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .suggestion-chip:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
  }
  @media (max-width: 480px) {
    .empty-state .suggestions { grid-template-columns: 1fr; }
  }

  /* ───── Bubbles ───── */
  .msg-row { display: flex; margin-bottom: 14px; gap: 8px; }
  .msg-row.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    line-height: 1.55;
  }
  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 14px;
    color: #fff;
  }
  .avatar.bot  { background: linear-gradient(135deg, var(--primary), var(--primary-2)); }
  .avatar.user { background: linear-gradient(135deg, #555 0%, #333 100%); }

  /* Markdown inside bubbles */
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child  { margin-bottom: 0; }
  .bubble p             { margin: 8px 0; }
  .bubble strong        { color: var(--primary-2); }
  .msg-row.user .bubble strong { color: #ffe9c8; }
  .bubble ul, .bubble ol { margin: 8px 0; padding-left: 20px; }
  .bubble li             { margin: 4px 0; }
  .bubble a {
    color: var(--primary);
    text-decoration: underline;
  }
  .msg-row.user .bubble a { color: #fff; }
  .bubble code {
    background: rgba(0,0,0,0.05);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "Cascadia Mono", Menlo, monospace;
    font-size: 13px;
  }
  .bubble img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    margin: 8px 0;
    display: block;
    border: 1px solid var(--border);
    background: #fff;
  }
  .user-image {
    max-width: 220px;
    border-radius: 12px;
    margin-top: 8px;
    display: block;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .meta-line {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 4px;
    margin-left: 8px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .meta-chip {
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 10px;
    font-family: ui-monospace, "Cascadia Mono", Menlo, monospace;
    font-size: 10px;
  }
  .meta-chip.agent { color: var(--primary-2); background: var(--primary-soft); }

  /* Typing indicator */
  .typing { display: inline-flex; gap: 4px; align-items: center; height: 16px; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text-soft);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
    40%           { opacity: 1;   transform: translateY(-3px); }
  }

  /* ───── Input area ───── */
  .input-wrap {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--surface);
  }
  .image-preview {
    display: none;
    align-items: center; gap: 10px;
    background: var(--surface-2);
    padding: 8px 10px 8px 8px;
    border-radius: 10px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .image-preview.show { display: flex; }
  .image-preview img {
    width: 48px; height: 48px;
    object-fit: cover;
    border-radius: 6px;
  }
  .image-preview .name {
    flex: 1;
    font-size: 13px;
    color: var(--text-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .image-preview .remove {
    background: transparent; border: none;
    color: var(--text-soft);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
  }
  .image-preview .remove:hover { color: var(--accent); }

  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 6px 6px 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: var(--primary); }
  textarea#input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    max-height: 140px;
    min-height: 24px;
    padding: 8px 0;
    line-height: 1.5;
  }
  textarea#input::placeholder { color: var(--text-soft); }
  .send-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    width: 38px; height: 38px;
    border-radius: 12px;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: var(--primary-2); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-soft);
    text-align: center;
  }

  /* Error toast */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">
        <div class="logo">🪷</div>
        <div class="header-title-text">
          <div class="name">Vạn An Group</div>
          <div class="sub" id="session-label">Tư vấn sản phẩm phong thủy</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="new-chat-btn" title="Cuộc trò chuyện mới">↻</button>
      </div>
    </header>

    <main class="chat" id="chat">
      <div class="empty-state" id="empty-state">
        <div style="font-size: 48px;">🪷</div>
        <h2>Chào bạn! Shop có thể giúp gì hôm nay?</h2>
        <p style="font-size: 13px;">Hỏi shop về sản phẩm phong thủy, mệnh hợp đá nào, size vòng tay, bảo hành, giao hàng,...</p>
        <div class="suggestions" id="suggestions">
          <button class="suggestion-chip" data-q="Shop có vòng tay đá tourmaline đa sắc không?">
            🔮 Vòng tay tourmaline đa sắc
          </button>
          <button class="suggestion-chip" data-q="Cổ tay mình 16cm thì đeo size mấy ly?">
            📏 Tính size vòng theo cổ tay
          </button>
          <button class="suggestion-chip" data-q="Mình sinh năm 1990 thì hợp đá phong thủy nào?">
            ☯️ Hợp đá theo năm sinh
          </button>
          <button class="suggestion-chip" data-q="Ship về Đà Nẵng bao lâu, có COD không?">
            🚚 Thông tin giao hàng
          </button>
        </div>
      </div>
    </main>

    <div class="input-wrap">
      <div class="image-preview" id="image-preview">
        <img id="image-preview-img" alt="preview">
        <div class="name" id="image-preview-name"></div>
        <button class="remove" id="image-preview-remove" title="Bỏ ảnh">✕</button>
      </div>
      <form class="input-row" id="input-form">
        <input type="file" id="file-input" accept="image/*" hidden>
        <button type="button" class="icon-btn" id="attach-btn" title="Đính kèm ảnh" style="border: none; background: transparent;">📎</button>
        <textarea id="input" rows="1" placeholder="Nhập câu hỏi cho shop..."></textarea>
        <button type="submit" class="send-btn" id="send-btn" title="Gửi">➤</button>
      </form>
      <div class="input-hint">Enter để gửi · Shift+Enter để xuống dòng</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // ────────────────────────────────────────────────────────────
  //  STATE
  // ────────────────────────────────────────────────────────────
  const API_BASE = ''; // same origin

  let sessionId   = localStorage.getItem('vanan_session_id');
  if (!sessionId) {
    sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('vanan_session_id', sessionId);
  }
  document.getElementById('session-label').textContent = 'Session: ' + sessionId;

  let pendingImage = null; // { base64, mime, name, dataURL }
  let isSending    = false;

  // ────────────────────────────────────────────────────────────
  //  ELEMENTS
  // ────────────────────────────────────────────────────────────
  const chatEl       = document.getElementById('chat');
  const emptyEl      = document.getElementById('empty-state');
  const inputEl      = document.getElementById('input');
  const sendBtn      = document.getElementById('send-btn');
  const formEl       = document.getElementById('input-form');
  const fileInput    = document.getElementById('file-input');
  const attachBtn    = document.getElementById('attach-btn');
  const previewEl    = document.getElementById('image-preview');
  const previewImg   = document.getElementById('image-preview-img');
  const previewName  = document.getElementById('image-preview-name');
  const previewRm    = document.getElementById('image-preview-remove');
  const newChatBtn   = document.getElementById('new-chat-btn');
  const suggestionsEl= document.getElementById('suggestions');
  const toastEl      = document.getElementById('toast');

  // ────────────────────────────────────────────────────────────
  //  HELPERS
  // ────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    })[m]);
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function hideEmptyState() {
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  function appendUserMessage(text, imageDataURL) {
    hideEmptyState();
    const row = document.createElement('div');
    row.className = 'msg-row user';
    let imgHtml = '';
    if (imageDataURL) {
      imgHtml = `<img class="user-image" src="${imageDataURL}" alt="upload">`;
    }
    row.innerHTML = `
      <div class="bubble">
        <div>${escapeHtml(text)}</div>
        ${imgHtml}
      </div>
      <div class="avatar user">B</div>
    `;
    chatEl.appendChild(row);
    scrollToBottom();
  }

  function appendBotTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="avatar bot">🪷</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chatEl.appendChild(row);
    scrollToBottom();
  }

  function replaceBotMessage(html, meta) {
    const typingRow = document.getElementById('typing-row');
    if (!typingRow) return;
    typingRow.removeAttribute('id');
    typingRow.innerHTML = `
      <div class="avatar bot">🪷</div>
      <div>
        <div class="bubble">${html}</div>
        <div class="meta-line">
          ${meta.agent_used ? `<span class="meta-chip agent">🤖 ${escapeHtml(meta.agent_used)}</span>` : ''}
          ${(meta.tools_called || []).map(t => `<span class="meta-chip">🛠 ${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
    `;
    scrollToBottom();
  }

  async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // result like "data:image/jpeg;base64,XXX"
        const result = reader.result;
        const comma = result.indexOf(',');
        resolve({
          dataURL: result,
          base64:  result.slice(comma + 1),
          mime:    file.type || 'image/jpeg',
        });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ────────────────────────────────────────────────────────────
  //  EVENT HANDLERS
  // ────────────────────────────────────────────────────────────
  inputEl.addEventListener('input', autoResize);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      formEl.requestSubmit();
    }
  });

  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const f = fileInput.files[0];
    if (!f) return;
    if (!f.type.startsWith('image/')) {
      showToast('Vui lòng chọn file ảnh');
      fileInput.value = '';
      return;
    }
    try {
      const data = await fileToBase64(f);
      pendingImage = { ...data, name: f.name };
      previewImg.src = data.dataURL;
      previewName.textContent = f.name;
      previewEl.classList.add('show');
    } catch (err) {
      showToast('Không đọc được ảnh');
    }
  });

  previewRm.addEventListener('click', () => {
    pendingImage = null;
    fileInput.value = '';
    previewEl.classList.remove('show');
  });

  newChatBtn.addEventListener('click', () => {
    if (!confirm('Bắt đầu cuộc trò chuyện mới? (lịch sử cũ vẫn lưu trong server)')) return;
    sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('vanan_session_id', sessionId);
    document.getElementById('session-label').textContent = 'Session: ' + sessionId;
    chatEl.innerHTML = '';
    chatEl.appendChild(emptyEl);
  });

  if (suggestionsEl) {
    suggestionsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.suggestion-chip');
      if (!btn) return;
      inputEl.value = btn.dataset.q || btn.textContent.trim();
      autoResize();
      inputEl.focus();
    });
  }

  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSending) return;

    const text = inputEl.value.trim();
    if (!text && !pendingImage) return;

    isSending = true;
    sendBtn.disabled = true;

    appendUserMessage(text || '(gửi ảnh)', pendingImage ? pendingImage.dataURL : null);
    inputEl.value = '';
    autoResize();

    appendBotTyping();

    const payload = pendingImage
      ? {
          endpoint: '/chat/image',
          body: {
            session_id: sessionId,
            message:    text,
            image_b64:  pendingImage.base64,
            mime:       pendingImage.mime,
          },
        }
      : {
          endpoint: '/chat',
          body: {
            session_id: sessionId,
            message:    text,
          },
        };

    // Clear preview after capturing
    pendingImage = null;
    fileInput.value = '';
    previewEl.classList.remove('show');

    try {
      const res = await fetch(API_BASE + payload.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload.body),
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`${res.status} ${errText.slice(0, 200)}`);
      }
      const data = await res.json();
      const html = marked.parse(data.response || '(không có phản hồi)');
      replaceBotMessage(html, {
        agent_used:   data.agent_used,
        tools_called: data.tools_called,
      });
    } catch (err) {
      const typing = document.getElementById('typing-row');
      if (typing) typing.remove();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML = `
        <div class="avatar bot">⚠️</div>
        <div class="bubble" style="background:#fde8e8;color:#7c2424;">
          Có lỗi khi gọi server: <code>${escapeHtml(err.message)}</code>
        </div>
      `;
      chatEl.appendChild(row);
      scrollToBottom();
      showToast('Lỗi kết nối server');
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  });

  inputEl.focus();
</script>
</body>
</html>
